
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-light: #c8e6c9; --green-mid: #a5d6a7; --green-btn: #81c784;
    --green-dark: #388e3c; --green-shine: #e8f5e9; --white: #ffffff;
    --text-main: #2e4a2e; --text-muted: #6a8f6a; --shadow: rgba(100,160,100,0.15);
  }
  body { font-family: 'Nunito', sans-serif; background: #f5fbf5; }
  #app { min-height: 100vh; background: linear-gradient(160deg, #e8f5e9 0%, #f1f8e9 40%, #e0f2f1 100%); overflow: hidden; }
  .header { text-align: center; padding: 2rem 1rem 1rem; position: relative; z-index: 10; }
  .header h1 { font-size: 2rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
  .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
  .progress-bar-wrap { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin: 0.75rem auto 0; max-width: 340px; }
  .progress-bar-track { flex: 1; height: 8px; background: var(--green-light); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green-btn), var(--green-dark)); border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .road-scene { position: relative; width: 100%; height: 140px; overflow: hidden; margin-bottom: -20px; }
  .road-svg { width: 100%; height: 100%; }
  .slider-container { position: relative; width: 100%; overflow: hidden; padding: 0 0 2rem; touch-action: pan-y; }
  .slider-track {
    display: flex; gap: 1.25rem; padding: 1.5rem 2rem 1rem;
    will-change: transform; cursor: grab;
    transition: none;
  }
  .slider-track.snapping { transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .slider-track:active { cursor: grabbing; }
  .stop-card { flex: 0 0 300px; background: var(--white); border-radius: 20px; border: 1.5px solid var(--green-mid); padding: 1.25rem 1.25rem 1rem; position: relative; box-shadow: 0 4px 20px var(--shadow); user-select: none; }
  .stop-card.done { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); border-color: var(--green-btn); }
  .stop-card.active-card { box-shadow: 0 8px 32px rgba(100,160,100,0.25); transform: translateY(-4px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
  .month-num { font-size: 2.5rem; font-weight: 800; color: var(--green-btn); line-height: 1; flex-shrink: 0; }
  .stop-card.done .month-num { color: var(--green-dark); }
  .month-info { flex: 1; }
  .month-name { font-size: 1.1rem; font-weight: 800; color: var(--text-main); line-height: 1.2; }
  .month-focus { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
  .check-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--green-btn); background: var(--green-shine); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; position: relative; overflow: hidden; }
  .check-btn::before { content: ''; position: absolute; top: 2px; left: 4px; width: 60%; height: 30%; background: rgba(255,255,255,0.5); border-radius: 99px; transform: rotate(-20deg); }
  .check-btn:hover { background: var(--green-btn); border-color: var(--green-dark); transform: scale(1.1); }
  .check-btn.checked { background: var(--green-dark); border-color: var(--green-dark); }
  .check-icon { width: 16px; height: 16px; color: var(--white); }
  .divider { height: 1px; background: var(--green-light); margin: 0.5rem 0 0.75rem; }
  .tasks-list { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
  .task-item { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.8rem; color: var(--text-main); line-height: 1.4; }
  .task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-btn); margin-top: 5px; flex-shrink: 0; }
  .stop-card.done .task-dot { background: var(--green-dark); }
  .result-box { margin-top: 0.85rem; background: var(--green-shine); border: 1px solid var(--green-light); border-radius: 10px; padding: 0.6rem 0.75rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; line-height: 1.4; }
  .stop-number { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--green-btn); color: var(--white); font-size: 0.7rem; font-weight: 800; padding: 2px 10px; border-radius: 99px; box-shadow: 0 2px 8px var(--shadow); white-space: nowrap; }
  .stop-card.done .stop-number { background: var(--green-dark); }
  .nav-area { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 0.5rem 1rem 1.5rem; position: relative; z-index: 10; }
  .nav-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--green-btn); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; overflow: hidden; box-shadow: 0 2px 10px var(--shadow); }
  .nav-btn::before { content: ''; position: absolute; top: 3px; left: 6px; width: 55%; height: 30%; background: rgba(255,255,255,0.6); border-radius: 99px; transform: rotate(-15deg); }
  .nav-btn:hover { background: var(--green-shine); transform: scale(1.08); }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .nav-btn svg { color: var(--green-dark); }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-light); transition: all 0.3s; cursor: pointer; }
  .dot.active { background: var(--green-dark); width: 20px; border-radius: 99px; }
  .dot.done-dot { background: var(--green-btn); }
</style>

<script>
const months = [
  { num:"03", name:"Март", focus:"Подготовительный этап", tasks:["Подготовка новой фотозоны для съёмки","Приобретены камера Canon EOS R8 и штатив","Обучение: настройка камеры, свет, съёмка, базовая обработка","Рабочий формат съёмки посуды из стекла с обработкой","Первичный сбор обратной связи от оптовых клиентов"], result:"Обновлена техническая база для съёмки и подготовлена основа для визуального обновления карточек.", done:false },
  { num:"04", name:"Апрель", focus:"Старт визуального обновления", tasks:["Запуск обновления упаковки для маркетплейсов","Обновление фото и упаковки в карточках маркетплейсов","Старт поэтапного обновления визуала карточек (апрель–сентябрь)","Подготовка открыток для вложения в заказы","Согласование партнёрских интеграций со смежными брендами"], result:"Начат основной этап визуального обновления продукции.", done:false },
  { num:"05", name:"Май", focus:"Запуск ключевых оптовых инструментов", tasks:["Запуск персональных предложений для оптовых клиентов","Старт механики раннего доступа к новинкам для партнёров","Внедрение системы сертификатов и статусов партнёров","Запуск программы персональных подарков для ключевых клиентов"], result:"Усилена лояльность партнёров и запущены инструменты роста повторных заказов.", done:false },
  { num:"06", name:"Июнь", focus:"Масштабирование оптового направления", tasks:["Анализ первых результатов персональных предложений","Расширение списка ключевых партнёров под систему статусов","Работа с новыми клиентами по СТМ","Развитие партнёрских интеграций"], result:"Повышена вовлечённость базы и начато расширение оптового канала.", done:false },
  { num:"07", name:"Июль", focus:"Кросс-маркетинг и новый сайт", tasks:["Запуск первой волны кросс-маркетинга с бытовой химией","Закрепление механики ротации партнёров раз в квартал","Сбор статистики: CTR, конверсии, продажи за квартал","Старт разработки предложения по новому сайту","Подготовка ТЗ, структуры сайта, расчёт бюджета","Старт поиска специалиста для ведения соцсетей"], result:"Запущена квартальная модель кросс-маркетинга и подготовлена digital-инфраструктура.", done:false },
  { num:"08", name:"Август", focus:"Запуск собственных соцсетей", tasks:["Запуск и наполнение VK-канала","Публикация контента по брендам и новинкам","Развитие визуального присутствия брендов в соцсетях","Подготовка площадок под дальнейшие коллаборации"], result:"Сформирован собственный канал коммуникации с аудиторией.", done:false },
  { num:"09", name:"Сентябрь", focus:"Внешние интеграции", tasks:["Запуск коллабораций с блогерами","Интеграции с соцсетями и внешними площадками","Запуск первых рекламных размещений после месяца ведения каналов","Тестирование блогерских интеграций на маркетплейсы и бренд"], result:"Расширен охват аудитории и создан дополнительный трафик.", done:false },
  { num:"10", name:"Октябрь", focus:"Аналитика и вторая волна кросс-маркетинга", tasks:["Квартальный сбор статистики по первой волне","Смена партнёра по кросс-маркетингу","Запуск второй волны размещений","Повторный сбор обратной связи от оптовых клиентов","Корректировка ассортимента и условий"], result:"Обновлены партнёрские размещения на основе реальной статистики.", done:false },
  { num:"11", name:"Ноябрь", focus:"Высокий сезон", tasks:["Усиление карточек под сезонный спрос","Акцент на подарочные и комплектные решения","Персональные предложения ключевым оптовым клиентам","Подготовка сезонных маркетинговых механик"], result:"Усилены продажи в период высокого спроса.", done:false },
  { num:"12", name:"Декабрь", focus:"Итоги года и стратегия 2027", tasks:["Анализ выполнения KPI","Оценка роста выручки","Итоговая аналитика по блогерам, соцсетям и кросс-маркетингу","Формирование стратегии на 2027 год"], result:"Подготовлен итоговый отчёт и стратегия масштабирования на следующий год.", done:false }
];

const CARD_W = 300;
const CARD_GAP = 20;
const SIDE_PAD = 32;
let current = 0;

// Drag state
let dragActive = false;
let dragStartX = 0;
let dragStartOffset = 0;
let currentOffset = 0;
let didDrag = false;

function getTrack() { return document.getElementById('slider-track'); }
function getContainer() { return document.getElementById('slider-container'); }

function cardOffset(idx) {
  const containerW = getContainer().offsetWidth;
  const cardTotal = CARD_W + CARD_GAP;
  const maxOffset = Math.max(0, months.length * cardTotal - containerW + SIDE_PAD);
  const ideal = idx * cardTotal - (containerW / 2) + CARD_W / 2;
  return Math.max(0, Math.min(ideal, maxOffset));
}

function applyOffset(offset, animate) {
  const track = getTrack();
  if (animate) {
    track.classList.add('snapping');
    setTimeout(() => track.classList.remove('snapping'), 380);
  } else {
    track.classList.remove('snapping');
  }
  track.style.transform = `translateX(-${offset}px)`;
  currentOffset = offset;
}

function snapToCurrent(animate) {
  applyOffset(cardOffset(current), animate);
  updateUI();
}

function updateUI() {
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === months.length - 1;
  Array.from(getTrack().children).forEach((c, i) => {
    c.classList.toggle('active-card', i === current);
  });
  updateDots();
  updateProgress();
}

function updateDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  months.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '') + (m.done ? ' done-dot' : '');
    d.onclick = () => { current = i; snapToCurrent(true); };
    dotsEl.appendChild(d);
  });
}

function updateProgress() {
  const done = months.filter(m => m.done).length;
  const pct = Math.round((done / months.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + months.length + ' месяцев';
}

function navigate(dir) {
  current = Math.max(0, Math.min(months.length - 1, current + dir));
  snapToCurrent(true);
}

function toggleDone(i) {
  months[i].done = !months[i].done;
  renderCards();
  snapToCurrent(false);
}

function renderCards() {
  const track = getTrack();
  track.innerHTML = '';
  months.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'stop-card' + (m.done ? ' done' : '') + (i === current ? ' active-card' : '');
    card.innerHTML = `
      <div class="stop-number">Остановка ${i + 1}</div>
      <div class="card-header">
        <div class="month-num">${m.num}</div>
        <div class="month-info">
          <div class="month-name">${m.name} 2026</div>
          <div class="month-focus">${m.focus}</div>
        </div>
        <button class="check-btn ${m.done ? 'checked' : ''}" data-idx="${i}" title="Отметить как выполненный">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            ${m.done ? '<polyline points="20 6 9 17 4 12"/>' : '<polyline points="20 6 9 17 4 12" opacity="0.3"/>'}
          </svg>
        </button>
      </div>
      <div class="divider"></div>
      <ul class="tasks-list">
        ${m.tasks.map(t => `<li class="task-item"><span class="task-dot"></span><span>${t}</span></li>`).join('')}
      </ul>
      <div class="result-box">📌 ${m.result}</div>
    `;
    card.querySelector('.check-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleDone(i);
    });
    card.addEventListener('click', () => {
      if (!didDrag) { current = i; snapToCurrent(true); }
    });
    track.appendChild(card);
  });
}

// Mouse drag — free scroll then snap
const container = document.getElementById('slider-container');

container.addEventListener('mousedown', e => {
  if (e.target.closest('.check-btn')) return;
  dragActive = true;
  didDrag = false;
  dragStartX = e.clientX;
  dragStartOffset = currentOffset;
  getTrack().classList.remove('snapping');
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!dragActive) return;
  const delta = dragStartX - e.clientX;
  if (Math.abs(delta) > 4) didDrag = true;
  const maxOffset = Math.max(0, months.length * (CARD_W + CARD_GAP) - getContainer().offsetWidth + SIDE_PAD);
  const newOffset = Math.max(0, Math.min(dragStartOffset + delta, maxOffset));
  applyOffset(newOffset, false);
});

document.addEventListener('mouseup', e => {
  if (!dragActive) return;
  dragActive = false;
  if (!didDrag) return;

  // Find which card center is closest to viewport center
  const containerW = getContainer().offsetWidth;
  const viewCenter = currentOffset + containerW / 2;
  const cardTotal = CARD_W + CARD_GAP;
  // Each card center = SIDE_PAD + i * cardTotal + CARD_W/2
  let best = 0, bestDist = Infinity;
  months.forEach((_, i) => {
    const center = SIDE_PAD + i * cardTotal + CARD_W / 2;
    const dist = Math.abs(center - viewCenter);
    if (dist < bestDist) { bestDist = dist; best = i; }
  });
  current = best;
  snapToCurrent(true);
  setTimeout(() => { didDrag = false; }, 50);
});

// Touch drag
container.addEventListener('touchstart', e => {
  if (e.target.closest('.check-btn')) return;
  dragStartX = e.touches[0].clientX;
  dragStartOffset = currentOffset;
  didDrag = false;
  getTrack().classList.remove('snapping');
}, { passive: true });

container.addEventListener('touchmove', e => {
  const delta = dragStartX - e.touches[0].clientX;
  if (Math.abs(delta) > 4) didDrag = true;
  const maxOffset = Math.max(0, months.length * (CARD_W + CARD_GAP) - getContainer().offsetWidth + SIDE_PAD);
  applyOffset(Math.max(0, Math.min(dragStartOffset + delta, maxOffset)), false);
}, { passive: true });

container.addEventListener('touchend', e => {
  if (!didDrag) return;
  const containerW = getContainer().offsetWidth;
  const viewCenter = currentOffset + containerW / 2;
  const cardTotal = CARD_W + CARD_GAP;
  let best = 0, bestDist = Infinity;
  months.forEach((_, i) => {
    const center = SIDE_PAD + i * cardTotal + CARD_W / 2;
    const dist = Math.abs(center - viewCenter);
    if (dist < bestDist) { bestDist = dist; best = i; }
  });
  current = best;
  snapToCurrent(true);
  setTimeout(() => { didDrag = false; }, 50);
}, { passive: true });

renderCards();
snapToCurrent(false);
</script>
